<!doctype html>
<html lang="hr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Mlinski Kamen - Nabava Firebase v2</title>
<style>
:root{--bg:#101010;--card:#1b1b1b;--card2:#242424;--text:#fff;--muted:#aaa;--line:#333;--green:#2e7d32;--yellow:#9a7a18;--red:#8b1e1e;--blue:#235c8f}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:14px}.wrap{max-width:1050px;margin:0 auto}h1{margin:0;text-align:center;font-size:28px}.sub{text-align:center;color:var(--muted);margin:4px 0 14px}button,input{font:inherit}button{border:0;border-radius:14px;color:white;background:var(--card2);padding:12px 14px;font-weight:800;cursor:pointer}button:active{transform:scale(.98)}.primary{background:var(--blue)}.danger{background:var(--red)}.green{background:var(--green)}.yellow{background:var(--yellow)}.mutedBtn{background:#3a3a3a}.hidden{display:none!important}.login{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;text-align:center}.user-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:14px}.user-grid button{height:78px;font-size:21px}.status{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 12px;color:#ddd;margin-bottom:12px;display:flex;justify-content:space-between;gap:10px;align-items:center}.topbar{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:12px}.addbar{display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:12px}.addbar input{background:#181818;color:white;border:1px solid var(--line);border-radius:14px;padding:13px 14px;font-size:16px}.tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:10px}.tabs button{white-space:nowrap;padding:10px 12px;background:#2b2b2b}.tabs button.active{background:var(--blue)}.search{width:100%;margin-bottom:12px;background:#181818;color:white;border:1px solid var(--line);border-radius:14px;padding:13px 14px;font-size:17px}.category{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:12px;margin-bottom:14px}.cat-title{font-size:22px;font-weight:900;margin:0 0 10px}.item{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;border-top:1px solid var(--line);padding:12px 0}.item:first-of-type{border-top:0}.item-name{font-size:19px;font-weight:800}.meta{color:var(--muted);font-size:13px;margin-top:4px}.note{color:#e0e0e0;font-size:14px;margin-top:5px}.state{min-width:116px;text-align:center;border-radius:14px;padding:11px 10px;font-weight:900}.state.ok{background:var(--green)}.state.need{background:var(--yellow)}.state.urgent{background:var(--red)}.action-row{display:none;grid-column:1/-1;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}.item.open .action-row{display:grid}.note-row{display:none;grid-column:1/-1;gap:8px;margin-top:8px;grid-template-columns:1fr auto}.item.open .note-row{display:grid}.note-input{background:#181818;color:white;border:1px solid var(--line);border-radius:14px;padding:12px}.problem-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:12px;margin-bottom:12px}.problem-title{font-size:22px;font-weight:900;margin-bottom:8px}.problem-line{padding:10px 0;border-top:1px solid var(--line);display:flex;justify-content:space-between;gap:8px;align-items:center}.problem-line:first-of-type{border-top:0}.history{max-height:430px;overflow:auto;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:10px}.history-line{border-top:1px solid var(--line);padding:9px 0;color:#ddd;font-size:14px}.history-line:first-child{border-top:0}.footer-note{color:var(--muted);font-size:12px;margin-top:12px;text-align:center}@media(max-width:650px){body{padding:10px}h1{font-size:23px}.item{grid-template-columns:1fr}.state{width:100%}.action-row{grid-template-columns:1fr}.note-row{grid-template-columns:1fr}.user-grid{grid-template-columns:1fr}.status{align-items:flex-start;flex-direction:column}}
</style>
</head>
<body>
<div class="wrap">
<h1>MLINSKI KAMEN</h1>
<div class="sub">NABAVA / KUHINJA</div>

<div id="login" class="login">
<h2>Tko koristi sustav?</h2>
<div class="user-grid" id="userGrid"></div>
<div class="footer-note">Klikni svoje ime. Sustav pamti tko je oznacio artikl.</div>
</div>

<div id="app" class="hidden">
<div class="status">
<div><b>Prijavljen:</b> <span id="currentUser"></span><br><span class="meta">Firebase verzija - svi mobiteli vide isto stanje.</span></div>
<button class="mutedBtn" onclick="logoutUser()">Promijeni korisnika</button>
</div>
<div class="topbar" id="topbar"></div>
<div id="itemsView">
<input class="search" id="searchInput" placeholder="🔍 Pretrazi artikl..." oninput="renderAll()" />
<div class="tabs" id="tabs"></div>
<div class="addbar"><input id="newItemInput" placeholder="Dodaj novi artikl u odabranu kategoriju..." /><button class="primary" onclick="addNewItem()">+ Dodaj</button></div>
<div id="items"></div>
</div>
<div id="orderView" class="hidden"></div>
<div id="historyView" class="hidden"><div class="history" id="history"></div></div>
<div class="footer-note">Firebase verzija. Statusi: IMA / TREBA / HITNO. Povijest vide Teo i Anamarija.</div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getDatabase, ref, onValue, set, push } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

// OVDJE ZALIJEPIS FIREBASE CONFIG
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBGBcGeqMCs-904J4-d1F00oRBik3djxTo",
  authDomain: "mlinski-kuhinja.firebaseapp.com",
  databaseURL: "https://mlinski-kuhinja-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "mlinski-kuhinja",
  storageBucket: "mlinski-kuhinja.firebasestorage.app",
  messagingSenderId: "255693099347",
  appId: "1:255693099347:web:de2e657e1d3758762b51a6",
  measurementId: "G-DNSH8V8RBZ"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const stateRef = ref(db, "nabava/state");
const historyRef = ref(db, "nabava/history");
const categoriesRef = ref(db, "nabava/categories");

const users = ["Marica","Sanjar","Nina","Ana","Kuhinja","Anamarija","Teo"];
const admins = ["Teo","Anamarija"];

// OVDJE MIJENJAS KATEGORIJE I ARTIKLE
let categories = [
 {id:"meso",name:"🥩 Meso",items:["Teletina","Svinjski vrat","Carsko","Piletina","Cevapi","Kebab","Spek tabla","Sunka za zagrebacki"]},
 {id:"povrce",name:"🥔 Povrce",items:["Krumpir","Luk","Mrkva","Zelena salata","Kupus","Rajcica","Krastavci","Grah"]},
 {id:"mlijecno",name:"🥛 Mlijecno",items:["Vrhnje za kuhanje","Kiselo vrhnje","Maslac","Sir","Kajmak","Mlijeko"]},
 {id:"suho",name:"🧂 Suho / Konzervirano",items:["Riza","Gustin","Brasno","Secer","Sol","Papar","Kukuruz","Ocat","Majoneza","Senf"]},
 {id:"pice",name:"🥤 Pice",items:["Cola 0.5","Fanta 0.5","Sprite 0.5","Jamnica","Pan lager","Pan zlatni","Bijelo vino","Crno vino"]},
 {id:"ambalaza",name:"📦 Ambalaza / Potrosni",items:["Vrece za smece","Rukavice","Alu folija","Prozirna folija","Papirnati rucnici","Salvete","Kutije za dostavu"]},
 {id:"kemija",name:"🧴 Kemija",items:["Arf","Deterdzent","Tablete za masinu","Sredstvo za pod","Odmascivac","Spuzvice"]}
];

const STORAGE_KEY="mk_nabava_state_v11";
const HISTORY_KEY="mk_nabava_history_v11";
const CATEGORIES_KEY="mk_nabava_categories_v11";

let currentUser=localStorage.getItem("mk_nabava_user")||"";
let activeCategory=categories[0].id;
let currentView="items";
let state=JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");
let history=JSON.parse(localStorage.getItem(HISTORY_KEY)||"[]");

function itemKey(categoryId,itemName){return `${categoryId}__${itemName}`}
function saveLocal(){
  set(stateRef, state);
}
function pushHistory(entry){
  push(historyRef, entry);
}
function stateLabel(s){if(s==="urgent")return"HITNO";if(s==="need")return"TREBA";return"IMA"}
function stateClass(s){if(s==="urgent")return"urgent";if(s==="need")return"need";return"ok"}
function getCategoryName(id){return categories.find(c=>c.id===id)?.name||id}
function formatShort(ts){if(!ts)return"";return new Date(ts).toLocaleString("hr-HR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})}

function setItemState(categoryId,itemName,newStatus,noteValue=null){
 const key=itemKey(categoryId,itemName);
 const oldStatus=state[key]?.status||"ok";
 const oldNote=state[key]?.note||"";
 const note=noteValue!==null ? noteValue : (newStatus==="ok" ? "" : oldNote);
 const entryTime = Date.now();
 state[key]={status:newStatus,note,changedBy:currentUser,changedAt:entryTime};
 pushHistory({time:entryTime,user:currentUser,categoryId,itemName,oldStatus,newStatus,oldNote,note});
 saveLocal();
}
function saveNote(categoryId,itemName,inputEl){
 const key=itemKey(categoryId,itemName);
 const current=state[key]||{status:"ok"};
 setItemState(categoryId,itemName,current.status||"ok",inputEl.value.trim());
}

window.addNewItem=function addNewItem(){
 const input=document.getElementById("newItemInput");
 const name=input.value.trim();
 if(!name) return;
 const cat=categories.find(c=>c.id===activeCategory);
 if(!cat) return;
 if(cat.items.some(x=>x.toLowerCase()===name.toLowerCase())){
   alert("Taj artikl već postoji u ovoj kategoriji.");
   return;
 }
 cat.items.push(name);
 set(categoriesRef, categories);
 input.value="";
 renderAll();
}

function renderUsers(){
 const grid=document.getElementById("userGrid");grid.innerHTML="";
 users.forEach(u=>{const btn=document.createElement("button");btn.textContent=u;btn.onclick=()=>{currentUser=u;localStorage.setItem("mk_nabava_user",u);showApp()};grid.appendChild(btn)})
}
function showApp(){document.getElementById("login").classList.add("hidden");document.getElementById("app").classList.remove("hidden");document.getElementById("currentUser").textContent=currentUser;renderAll()}
window.logoutUser=function(){localStorage.removeItem("mk_nabava_user");currentUser="";document.getElementById("app").classList.add("hidden");document.getElementById("login").classList.remove("hidden")}
window.setView=function(view){currentView=view;document.getElementById("itemsView").classList.toggle("hidden",view!=="items");document.getElementById("orderView").classList.toggle("hidden",view!=="order");document.getElementById("historyView").classList.toggle("hidden",view!=="history");renderAll()}

function getProblemCounts(){const p=getProblems();return {urgent:p.urgent.length,need:p.need.length}}
function renderTopbar(){
 const tb=document.getElementById("topbar");tb.innerHTML="";
 const itemsBtn=document.createElement("button");itemsBtn.className=currentView==="items"?"primary":"mutedBtn";itemsBtn.textContent="📋 Artikli";itemsBtn.onclick=()=>setView("items");tb.appendChild(itemsBtn);
 const counts=getProblemCounts();
 const orderBtn=document.createElement("button");orderBtn.className=currentView==="order"?"yellow":"mutedBtn";orderBtn.textContent=`📦 Narudzba 🔴${counts.urgent} 🟡${counts.need}`;orderBtn.onclick=()=>setView("order");tb.appendChild(orderBtn);
 if(admins.includes(currentUser)){const historyBtn=document.createElement("button");historyBtn.className=currentView==="history"?"primary":"mutedBtn";historyBtn.textContent="📜 Povijest";historyBtn.onclick=()=>setView("history");tb.appendChild(historyBtn)}
}
function renderTabs(){
 const tabs=document.getElementById("tabs");tabs.innerHTML="";
 categories.forEach(cat=>{const btn=document.createElement("button");btn.textContent=cat.name;btn.className=cat.id===activeCategory?"active":"";btn.onclick=()=>{activeCategory=cat.id;renderAll()};tabs.appendChild(btn)})
}
function matchesSearch(itemName){const q=document.getElementById("searchInput")?.value?.trim().toLowerCase()||"";if(!q)return true;return itemName.toLowerCase().includes(q)}
function renderItems(){
 const wrap=document.getElementById("items");wrap.innerHTML="";
 const q=document.getElementById("searchInput")?.value?.trim()||"";
 if(q){
  const box=document.createElement("div");box.className="category";
  const title=document.createElement("div");title.className="cat-title";title.textContent=`🔍 Rezultati za: ${q}`;box.appendChild(title);
  categories.forEach(cat=>{cat.items.filter(matchesSearch).forEach(itemName=>box.appendChild(buildItemRow(cat,itemName)))});
  wrap.appendChild(box);return;
 }
 const cat=categories.find(c=>c.id===activeCategory);
 const box=document.createElement("div");box.className="category";
 const title=document.createElement("div");title.className="cat-title";title.textContent=cat.name;box.appendChild(title);
 cat.items.forEach(itemName=>box.appendChild(buildItemRow(cat,itemName)));
 wrap.appendChild(box);
}
function buildItemRow(cat,itemName){
 const key=itemKey(cat.id,itemName);
 const itemState=state[key]?.status||"ok";
 const changedBy=state[key]?.changedBy||"";
 const changedAt=state[key]?.changedAt||"";
 const note=state[key]?.note||"";
 const row=document.createElement("div");row.className="item";
 const left=document.createElement("div");
 left.innerHTML=`<div class="item-name">${itemName}</div><div class="meta">${changedBy?`Oznacio: ${changedBy} • ${formatShort(changedAt)}`:"Nije oznaceno"}</div>${note?`<div class="note">📝 ${note}</div>`:""}`;
 const statusBtn=document.createElement("button");statusBtn.className=`state ${stateClass(itemState)}`;statusBtn.textContent=stateLabel(itemState);statusBtn.onclick=()=>row.classList.toggle("open");
 const actions=document.createElement("div");actions.className="action-row";
 const okBtn=document.createElement("button");okBtn.className="green";okBtn.textContent="IMA";okBtn.onclick=()=>setItemState(cat.id,itemName,"ok");
 const needBtn=document.createElement("button");needBtn.className="yellow";needBtn.textContent="TREBA";needBtn.onclick=()=>setItemState(cat.id,itemName,"need");
 const urgentBtn=document.createElement("button");urgentBtn.className="danger";urgentBtn.textContent="HITNO";urgentBtn.onclick=()=>setItemState(cat.id,itemName,"urgent");
 actions.appendChild(okBtn);actions.appendChild(needBtn);actions.appendChild(urgentBtn);
 const noteRow=document.createElement("div");noteRow.className="note-row";
 const input=document.createElement("input");input.className="note-input";input.placeholder="Biljeska nije obavezna...";input.value=note;
 const saveBtn=document.createElement("button");saveBtn.className="primary";saveBtn.textContent="Spremi biljesku";saveBtn.onclick=()=>saveNote(cat.id,itemName,input);
 noteRow.appendChild(input);noteRow.appendChild(saveBtn);
 row.appendChild(left);row.appendChild(statusBtn);row.appendChild(actions);row.appendChild(noteRow);
 return row;
}
function getProblems(){
 const urgent=[];const need=[];
 categories.forEach(cat=>{cat.items.forEach(itemName=>{
  const key=itemKey(cat.id,itemName);const s=state[key]?.status||"ok";
  const entry={category:cat.name,categoryId:cat.id,itemName,note:state[key]?.note||"",changedBy:state[key]?.changedBy||"",changedAt:state[key]?.changedAt||0};
  if(s==="urgent")urgent.push(entry);if(s==="need")need.push(entry);
 })});
 return{urgent,need};
}

function clearOrder(){
 const {urgent,need}=getProblems();
 const all=[...urgent,...need];

 if(!all.length){
   alert("Narudzba je vec prazna.");
   return;
 }

 const ok=confirm(`Obrisati cijelu narudzbu?\n\nVratit ce se na IMA: ${all.length} artikala.`);
 if(!ok) return;

 all.forEach(x=>{
   const key=itemKey(x.categoryId,x.itemName);
   const oldStatus=state[key]?.status||"ok";
   const oldNote=state[key]?.note||"";

   state[key]={
     status:"ok",
     note:"",
     changedBy:currentUser,
     changedAt:Date.now()
   };

   pushHistory({
     time:Date.now(),
     user:currentUser,
     categoryId:x.categoryId,
     itemName:x.itemName,
     oldStatus,
     newStatus:"ok",
     oldNote,
     note:""
   });
 });

 saveLocal();
 renderAll();
}

function renderOrder(){
 const wrap=document.getElementById("orderView");wrap.innerHTML="";
 const {urgent,need}=getProblems();

 const clearBox=document.createElement("div");
 clearBox.className="problem-card";
 clearBox.innerHTML=`<div class="problem-title">📦 Narudzba</div><div class="meta">Ovim gumbom vracas sve artikle iz narudzbe na IMA.</div>`;
 const clearBtn=document.createElement("button");
 clearBtn.className="danger";
 clearBtn.textContent="✅ OBRISI CIJELU NARUDZBU";
 clearBtn.onclick=clearOrder;
 clearBox.appendChild(document.createElement("br"));
 clearBox.appendChild(clearBtn);
 wrap.appendChild(clearBox);
 function card(title,arr){
  const c=document.createElement("div");c.className="problem-card";
  const t=document.createElement("div");t.className="problem-title";t.textContent=`${title} (${arr.length})`;c.appendChild(t);
  if(!arr.length){const empty=document.createElement("div");empty.className="meta";empty.textContent="Nema artikala.";c.appendChild(empty)}
  arr.forEach(x=>{
   const line=document.createElement("div");line.className="problem-line";
   line.innerHTML=`<div><b>${x.itemName}</b><div class="meta">${x.category} • ${x.changedBy||""} ${formatShort(x.changedAt)}</div>${x.note?`<div class="note">📝 ${x.note}</div>`:""}</div>`;
   const btn=document.createElement("button");btn.className="green";btn.textContent="IMA";btn.onclick=()=>{if(confirm(`Vratiti "${x.itemName}" na IMA?`)) setItemState(x.categoryId,x.itemName,"ok")};
   line.appendChild(btn);c.appendChild(line);
  });
  return c;
 }
 wrap.appendChild(card("🔴 HITNO",urgent));wrap.appendChild(card("🟡 TREBA",need));
}
function renderHistory(){
 const wrap=document.getElementById("history");wrap.innerHTML="";
 if(!admins.includes(currentUser)){wrap.innerHTML=`<div class="meta">Povijest je dostupna samo Teu i Anamariji.</div>`;return}
 if(!history.length){wrap.innerHTML=`<div class="meta">Jos nema povijesti.</div>`;return}
 history.slice(0,200).forEach(h=>{
  const line=document.createElement("div");line.className="history-line";
  const time=new Date(h.time).toLocaleString("hr-HR");
  const noteText=h.note?` • Biljeska: ${h.note}`:"";
  line.textContent=`${time} — ${h.user} — ${getCategoryName(h.categoryId)} — ${h.itemName}: ${stateLabel(h.oldStatus)} → ${stateLabel(h.newStatus)}${noteText}`;
  wrap.appendChild(line);
 });
}
function renderAll(){renderTopbar();renderTabs();if(currentView==="items")renderItems();if(currentView==="order")renderOrder();if(currentView==="history")renderHistory()}

// FIREBASE REALTIME LISTENERS
onValue(categoriesRef, (snapshot) => {
  const data = snapshot.val();
  if (data && Array.isArray(data)) {
    categories = data;
  } else {
    set(categoriesRef, categories);
  }
  if (!activeCategory && categories.length) activeCategory = categories[0].id;
  renderAll();
});
onValue(stateRef, (snapshot) => {
  state = snapshot.val() || {};
  renderAll();
});
onValue(historyRef, (snapshot) => {
  const data = snapshot.val() || {};
  history = Object.values(data).sort((a,b) => (b.time || 0) - (a.time || 0)).slice(0,500);
  renderAll();
});
window.renderAll = renderAll;

renderUsers();if(currentUser)showApp();
</script>
</body>
</html>
