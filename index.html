<!doctype html>
<html lang="hr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Mlinski Kamen - Nabava v3 Production</title>
<style>
:root{
  --bg:#101010;--card:#1b1b1b;--card2:#242424;--text:#fff;--muted:#aaa;--line:#333;
  --green:#2e7d32;--yellow:#9a7a18;--red:#8b1e1e;--blue:#235c8f;--purple:#5b3f8c
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:14px}
.wrap{max-width:1050px;margin:0 auto}
h1{margin:0;text-align:center;font-size:28px}
.sub{text-align:center;color:var(--muted);margin:4px 0 14px}
button,input{font:inherit}
button{border:0;border-radius:14px;color:white;background:var(--card2);padding:12px 14px;font-weight:800;cursor:pointer}
button:active{transform:scale(.98)}
.primary{background:var(--blue)}.danger{background:var(--red)}.green{background:var(--green)}.yellow{background:var(--yellow)}.purple{background:var(--purple)}.mutedBtn{background:#3a3a3a}
.hidden{display:none!important}
.login{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;text-align:center}
.user-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:14px}
.user-grid button{height:78px;font-size:21px}
.status{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 12px;color:#ddd;margin-bottom:12px;display:flex;justify-content:space-between;gap:10px;align-items:center}
.topbar{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:12px}
.addbar{display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:12px}
.addbar input{background:#181818;color:white;border:1px solid var(--line);border-radius:14px;padding:13px 14px;font-size:16px}
.tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:10px}
.tabs button{white-space:nowrap;padding:10px 12px;background:#2b2b2b}
.tabs button.active{background:var(--blue)}
.search{width:100%;margin-bottom:12px;background:#181818;color:white;border:1px solid var(--line);border-radius:14px;padding:13px 14px;font-size:17px}
.category{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:12px;margin-bottom:14px}
.cat-title{font-size:22px;font-weight:900;margin:0 0 10px;display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap}
.cat-actions{display:flex;gap:7px;flex-wrap:wrap}
.cat-actions button{font-size:13px;padding:8px 10px;border-radius:10px}
.item{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;border-top:1px solid var(--line);padding:12px 0}
.item:first-of-type{border-top:0}
.item-name{font-size:19px;font-weight:800}
.meta{color:var(--muted);font-size:13px;margin-top:4px}
.note{color:#e0e0e0;font-size:14px;margin-top:5px}
.state{min-width:116px;text-align:center;border-radius:14px;padding:11px 10px;font-weight:900}
.state.ok{background:var(--green)}.state.need{background:var(--yellow)}.state.urgent{background:var(--red)}
.action-row{display:none;grid-column:1/-1;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.item.open .action-row{display:grid}
.note-row{display:none;grid-column:1/-1;gap:8px;margin-top:8px;grid-template-columns:1fr auto}
.item.open .note-row{display:grid}
.note-input{background:#181818;color:white;border:1px solid var(--line);border-radius:14px;padding:12px}
.admin-actions{display:none;grid-column:1/-1;gap:7px;flex-wrap:wrap;margin-top:8px}
.item.open .admin-actions{display:flex}
.admin-actions button{padding:8px 10px;border-radius:10px;font-size:13px}
.problem-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:12px;margin-bottom:12px}
.problem-title{font-size:22px;font-weight:900;margin-bottom:8px}
.problem-line{padding:10px 0;border-top:1px solid var(--line);display:flex;justify-content:space-between;gap:8px;align-items:center}
.problem-line:first-of-type{border-top:0}
.history{max-height:430px;overflow:auto;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:10px}
.history-line{border-top:1px solid var(--line);padding:9px 0;color:#ddd;font-size:14px}
.history-line:first-child{border-top:0}
.footer-note{color:var(--muted);font-size:12px;margin-top:12px;text-align:center}
.badge{display:inline-block;background:#333;border:1px solid #555;color:#ddd;border-radius:999px;padding:3px 8px;font-size:12px;margin:3px 4px 0 0}
@media(max-width:650px){
  body{padding:10px}h1{font-size:23px}.item{grid-template-columns:1fr}.state{width:100%}
  .action-row{grid-template-columns:1fr}.note-row{grid-template-columns:1fr}.addbar{grid-template-columns:1fr}
  .user-grid{grid-template-columns:1fr}.status{align-items:flex-start;flex-direction:column}
}
</style>
</head>
<body>
<div class="wrap">
<h1>MLINSKI KAMEN</h1>
<div class="sub">NABAVA / KUHINJA</div>

<div id="login" class="login">
<h2>Tko koristi sustav?</h2>
<div class="user-grid" id="userGrid"></div>
<div class="footer-note">Klikni svoje ime. Sustav pamti tko je oznacio artikl.</div>
</div>

<div id="app" class="hidden">
<div class="status">
<div><b>Prijavljen:</b> <span id="currentUser"></span><br><span class="meta">Isti artikl moze biti u vise skladista. Status je zajednicki.</span></div>
<button class="mutedBtn" onclick="logoutUser()">Promijeni korisnika</button>
</div>
<div class="topbar" id="topbar"></div>
<div id="itemsView">
<input class="search" id="searchInput" placeholder="🔍 Pretrazi artikl..." oninput="renderAll()" />
<div class="tabs" id="tabs"></div>
<div class="addbar">
  <input id="newItemInput" placeholder="Dodaj novi artikl..." />
  <button class="primary" onclick="addNewItem()">+ Dodaj</button>
</div>
<div id="items"></div>
</div>
<div id="orderView" class="hidden"></div>
<div id="historyView" class="hidden"><div class="history" id="history"></div></div>
<div class="footer-note">Production verzija. Koristi nabava_v3.</div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getDatabase, ref, onValue, set, push, remove } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBGBcGeqMCs-904J4-d1F00oRBik3djxTo",
  authDomain: "mlinski-kuhinja.firebaseapp.com",
  databaseURL: "https://mlinski-kuhinja-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "mlinski-kuhinja",
  storageBucket: "mlinski-kuhinja.firebasestorage.app",
  messagingSenderId: "255693099347",
  appId: "1:255693099347:web:de2e657e1d3758762b51a6",
  measurementId: "G-DNSH8V8RBZ"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// STARA V2 BAZA SAMO ZA MIGRACIJU
const oldCategoriesRef = ref(db, "nabava/categories");
const oldStateRef = ref(db, "nabava/state");

// NOVA V3 BAZA
const itemsRef = ref(db, "nabava_v3/items");
const categoriesRef = ref(db, "nabava_v3/categories");
const stateRef = ref(db, "nabava_v3/state");
const historyRef = ref(db, "nabava_v3/history");
const metaRef = ref(db, "nabava_v3/meta");

const users = ["Marica","Sanjar","Nina","Ana","Kuhinja","Anamarija","Teo"];
const admins = ["Teo","Anamarija"];

const defaultOldCategories = [
 {id:"meso",name:"🥩 Meso",items:["Teletina","Svinjski vrat","Carsko","Piletina","Cevapi","Kebab","Spek tabla","Sunka za zagrebacki"]},
 {id:"povrce",name:"🥔 Povrce",items:["Krumpir","Luk","Mrkva","Zelena salata","Kupus","Rajcica","Krastavci","Grah"]},
 {id:"mlijecno",name:"🥛 Mlijecno",items:["Vrhnje za kuhanje","Kiselo vrhnje","Maslac","Sir","Kajmak","Mlijeko"]},
 {id:"suho",name:"🧂 Suho / Konzervirano",items:["Riza","Gustin","Brasno","Secer","Sol","Papar","Kukuruz","Ocat","Majoneza","Senf"]},
 {id:"pice",name:"🥤 Pice",items:["Cola 0.5","Fanta 0.5","Sprite 0.5","Jamnica","Pan lager","Pan zlatni","Bijelo vino","Crno vino"]},
 {id:"ambalaza",name:"📦 Ambalaza / Potrosni",items:["Vrece za smece","Rukavice","Alu folija","Prozirna folija","Papirnati rucnici","Salvete","Kutije za dostavu"]},
 {id:"kemija",name:"🧴 Kemija",items:["Arf","Deterdzent","Tablete za masinu","Sredstvo za pod","Odmascivac","Spuzvice"]}
];

let currentUser = localStorage.getItem("mk_nabava_user") || "";
let currentView = "items";
let activeCategory = "";
let items = {};
let categories = [];
let state = {};
let history = [];
let oldCategoriesLoaded = false;
let oldStateLoaded = false;
let oldCategoriesData = null;
let oldStateData = null;
let importInProgress = false;
let v3ItemsLoaded = false;
let v3CategoriesLoaded = false;
let v3ItemsData = null;
let v3CategoriesData = null;

function isAdmin(){ return admins.includes(currentUser); }
function slugify(text){
  return String(text).toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9]+/g,"_")
    .replace(/^_+|_+$/g,"")
    .substring(0,60) || ("item_"+Date.now());
}
function uniqueItemId(name, collection){
  const base = slugify(name);
  let id = base;
  let n = 2;
  while(collection[id]){ id = base + "_" + n; n++; }
  return id;
}
function getItemName(itemId){ return items[itemId]?.name || itemId; }
function stateLabel(s){ if(s==="urgent")return"HITNO"; if(s==="need")return"TREBA"; return"IMA"; }
function stateClass(s){ if(s==="urgent")return"urgent"; if(s==="need")return"need"; return"ok"; }
function formatShort(ts){ if(!ts)return""; return new Date(ts).toLocaleString("hr-HR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}); }
function getCategoryName(id){ return categories.find(c=>c.id===id)?.name || id; }
function itemState(itemId){ return state[itemId]?.status || "ok"; }
function itemNote(itemId){ return state[itemId]?.note || ""; }
function saveAll(){ set(itemsRef, items); set(categoriesRef, categories); }
function pushHistory(entry){ push(historyRef, entry); }


function migrateIfNeeded(){
  if(importInProgress) return;
  // V3.8: ne radimo automatski import.
  // Stara nabava baza ostaje netaknuta.
  // Uvoz se pokrece samo rucno preko gumba "Uvezi v2".
  if(!v3ItemsLoaded || !v3CategoriesLoaded) return;

  items = v3ItemsData || {};
  if(Array.isArray(v3CategoriesData)){
    categories = v3CategoriesData.map(c => ({
      ...c,
      items: Array.isArray(c.items) ? c.items : Object.values(c.items || {})
    }));
  } else if(v3CategoriesData){
    categories = Object.values(v3CategoriesData).map(c => ({
      ...c,
      items: Array.isArray(c.items) ? c.items : Object.values(c.items || {})
    }));
  } else {
    categories = [];
  }

  if(!activeCategory && categories.length) activeCategory = categories[0].id;
  renderAll();
}

function setItemState(categoryId,itemId,newStatus,noteValue=null){
  const oldStatus = state[itemId]?.status || "ok";
  const oldNote = state[itemId]?.note || "";
  const note = noteValue !== null ? noteValue : (newStatus === "ok" ? "" : oldNote);
  const entryTime = Date.now();
  state[itemId] = { status:newStatus, note, changedBy:currentUser, changedAt:entryTime };
  pushHistory({time:entryTime,user:currentUser,categoryId,itemId,itemName:getItemName(itemId),oldStatus,newStatus,oldNote,note});
  set(stateRef, state);
}
function saveNote(categoryId,itemId,inputEl){
  setItemState(categoryId,itemId,itemState(itemId),inputEl.value.trim());
}

window.addNewItem = function addNewItem(){

  const input = document.getElementById("newItemInput");
  const name = input.value.trim();
  if(!name) return;

  const existingId = Object.keys(items).find(id => items[id].name.toLowerCase() === name.toLowerCase());
  const itemId = existingId || uniqueItemId(name, items);
  if(!existingId) items[itemId] = { id:itemId, name, createdAt:Date.now() };

  const chosen = chooseCategoriesForItem(itemId, [activeCategory]);
  if(!chosen) return;

  categories.forEach(cat=>{
    cat.items = (cat.items || []).filter(id=>id!==itemId);
    if(chosen.includes(cat.id)) cat.items.push(itemId);
  });

  if(!state[itemId]) state[itemId] = {status:"ok", note:"", changedBy:"", changedAt:0};

  input.value = "";
  saveAll();
  set(stateRef, state);
  renderAll();
}

function chooseCategoriesForItem(itemId, selectedIds){
  const itemName = getItemName(itemId);
  const list = categories.map((c,i)=>`${i+1}. ${c.name}${selectedIds.includes(c.id) ? " ✅" : ""}`).join("\n");
  const def = selectedIds.map(id=>categories.findIndex(c=>c.id===id)+1).filter(n=>n>0).join(",");
  const answer = prompt(`Gdje se prikazuje "${itemName}"?\n\nUpisi brojeve skladista odvojene zarezom:\n\n${list}`, def);
  if(answer === null) return null;
  const nums = answer.split(",").map(x=>Number(x.trim())).filter(n=>n>=1 && n<=categories.length);
  const chosen = [...new Set(nums.map(n=>categories[n-1].id))];
  if(!chosen.length){ alert("Moras odabrati barem jedno skladiste."); return null; }
  return chosen;
}

function renderUsers(){
  const grid=document.getElementById("userGrid"); grid.innerHTML="";
  users.forEach(u=>{
    const btn=document.createElement("button");
    btn.textContent=u;
    btn.onclick=()=>{currentUser=u;localStorage.setItem("mk_nabava_user",u);showApp()};
    grid.appendChild(btn);
  });
}
function showApp(){
  document.getElementById("login").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  document.getElementById("currentUser").textContent=currentUser;
  renderAll();
}
window.logoutUser=function(){
  localStorage.removeItem("mk_nabava_user");
  currentUser="";
  document.getElementById("app").classList.add("hidden");
  document.getElementById("login").classList.remove("hidden");
}
window.setView=function(view){
  currentView=view;
  document.getElementById("itemsView").classList.toggle("hidden",view!=="items");
  document.getElementById("orderView").classList.toggle("hidden",view!=="order");
  document.getElementById("historyView").classList.toggle("hidden",view!=="history");
  renderAll();
}

function getProblems(){
  const urgent=[]; const need=[];
  Object.keys(items).forEach(itemId=>{
    const s = itemState(itemId);
    const entry = {
      itemId,
      itemName:getItemName(itemId),
      note: itemNote(itemId),
      changedBy: state[itemId]?.changedBy || "",
      changedAt: state[itemId]?.changedAt || 0,
      categories: categories.filter(c=>(c.items||[]).includes(itemId)).map(c=>c.name).join(", ")
    };
    if(s==="urgent") urgent.push(entry);
    if(s==="need") need.push(entry);
  });
  return {urgent,need};
}
function getProblemCounts(){const p=getProblems();return {urgent:p.urgent.length,need:p.need.length}}

function renderTopbar(){
  const tb=document.getElementById("topbar"); tb.innerHTML="";
  const itemsBtn=document.createElement("button");
  itemsBtn.className=currentView==="items"?"primary":"mutedBtn";
  itemsBtn.textContent="📋 Artikli";
  itemsBtn.onclick=()=>setView("items");
  tb.appendChild(itemsBtn);

  const counts=getProblemCounts();
  const orderBtn=document.createElement("button");
  orderBtn.className=currentView==="order"?"yellow":"mutedBtn";
  orderBtn.textContent=`📦 Narudzba 🔴${counts.urgent} 🟡${counts.need}`;
  orderBtn.onclick=()=>setView("order");
  tb.appendChild(orderBtn);

  if(isAdmin()){
    const historyBtn=document.createElement("button");
    historyBtn.className=currentView==="history"?"primary":"mutedBtn";
    historyBtn.textContent="📜 Povijest";
    historyBtn.onclick=()=>setView("history");
    tb.appendChild(historyBtn);

    const addCat=document.createElement("button");
    addCat.className="purple";
    addCat.textContent="+ Skladiste";
    addCat.onclick=addCategory;
    tb.appendChild(addCat);
  }
}
function renderTabs(){
  const tabs=document.getElementById("tabs"); tabs.innerHTML="";
  categories.forEach(cat=>{
    const btn=document.createElement("button");
    btn.textContent=cat.name;
    btn.className=cat.id===activeCategory?"active":"";
    btn.onclick=()=>{activeCategory=cat.id;renderAll()};
    tabs.appendChild(btn);
  });
}
function matchesSearch(itemId){
  const q=document.getElementById("searchInput")?.value?.trim().toLowerCase()||"";
  if(!q)return true;
  return getItemName(itemId).toLowerCase().includes(q);
}
function renderItems(){
  const wrap=document.getElementById("items"); wrap.innerHTML="";
  const q=document.getElementById("searchInput")?.value?.trim()||"";

  if(q){
    const box=document.createElement("div"); box.className="category";
    const title=document.createElement("div"); title.className="cat-title"; title.textContent=`🔍 Rezultati za: ${q}`; box.appendChild(title);
    Object.keys(items).filter(matchesSearch).forEach(itemId=>box.appendChild(buildItemRow({id:"search",name:"Pretraga"}, itemId)));
    wrap.appendChild(box); return;
  }

  const cat=categories.find(c=>c.id===activeCategory) || categories[0];
  if(!cat){ wrap.innerHTML='<div class="meta">Nema skladista.</div>'; return; }

  const box=document.createElement("div"); box.className="category";
  const title=document.createElement("div"); title.className="cat-title";
  title.innerHTML = `<span>${cat.name}</span>`;
  if(isAdmin()){
    const catActions=document.createElement("div"); catActions.className="cat-actions";
    const rename=document.createElement("button"); rename.className="primary"; rename.textContent="✏️ Naziv"; rename.onclick=()=>renameCategory(cat.id);
    const up=document.createElement("button"); up.className="mutedBtn"; up.textContent="⬆️"; up.onclick=()=>moveCategory(cat.id,-1);
    const down=document.createElement("button"); down.className="mutedBtn"; down.textContent="⬇️"; down.onclick=()=>moveCategory(cat.id,1);
    const del=document.createElement("button"); del.className="danger"; del.textContent="🗑️"; del.onclick=()=>deleteCategory(cat.id);
    catActions.append(rename,up,down,del);
    title.appendChild(catActions);
  }
  box.appendChild(title);

  (cat.items || []).forEach(itemId=>box.appendChild(buildItemRow(cat,itemId)));
  wrap.appendChild(box);
}
function buildItemRow(cat,itemId){
  const row=document.createElement("div"); row.className="item";
  const s=itemState(itemId);
  const changedBy=state[itemId]?.changedBy||"";
  const changedAt=state[itemId]?.changedAt||"";
  const note=itemNote(itemId);
  const places=categories.filter(c=>(c.items||[]).includes(itemId)).map(c=>c.name).join(", ");

  const left=document.createElement("div");
  left.innerHTML=`<div class="item-name">${getItemName(itemId)}</div>
    <div class="meta">${changedBy?`Oznacio: ${changedBy} • ${formatShort(changedAt)}`:"Nije oznaceno"}${isAdmin()?`<br>📍 ${places}`:""}</div>
    ${note?`<div class="note">📝 ${note}</div>`:""}`;

  const statusBtn=document.createElement("button");
  statusBtn.className=`state ${stateClass(s)}`;
  statusBtn.textContent=stateLabel(s);
  statusBtn.onclick=()=>row.classList.toggle("open");

  const actions=document.createElement("div"); actions.className="action-row";
  const okBtn=document.createElement("button"); okBtn.className="green"; okBtn.textContent="IMA"; okBtn.onclick=()=>setItemState(cat.id,itemId,"ok");
  const needBtn=document.createElement("button"); needBtn.className="yellow"; needBtn.textContent="TREBA"; needBtn.onclick=()=>setItemState(cat.id,itemId,"need");
  const urgentBtn=document.createElement("button"); urgentBtn.className="danger"; urgentBtn.textContent="HITNO"; urgentBtn.onclick=()=>setItemState(cat.id,itemId,"urgent");
  actions.append(okBtn,needBtn,urgentBtn);

  const noteRow=document.createElement("div"); noteRow.className="note-row";
  const input=document.createElement("input"); input.className="note-input"; input.placeholder="Biljeska nije obavezna..."; input.value=note;
  const saveBtn=document.createElement("button"); saveBtn.className="primary"; saveBtn.textContent="Spremi biljesku"; saveBtn.onclick=()=>saveNote(cat.id,itemId,input);
  noteRow.append(input,saveBtn);

  row.append(left,statusBtn,actions,noteRow);

  if(isAdmin()){
    const adm=document.createElement("div"); adm.className="admin-actions";
    const rename=document.createElement("button"); rename.className="primary"; rename.textContent="✏️ Naziv"; rename.onclick=()=>renameItem(itemId);
    const placesBtn=document.createElement("button"); placesBtn.className="purple"; placesBtn.textContent="📍 Skladista"; placesBtn.onclick=()=>manageItemCategories(itemId);
    const up=document.createElement("button"); up.className="mutedBtn"; up.textContent="⬆️ Gore"; up.onclick=()=>moveItemInCategory(activeCategory,itemId,-1);
    const down=document.createElement("button"); down.className="mutedBtn"; down.textContent="⬇️ Dolje"; down.onclick=()=>moveItemInCategory(activeCategory,itemId,1);
    const rem=document.createElement("button"); rem.className="danger"; rem.textContent="Makni iz skladista"; rem.onclick=()=>removeFromCategory(activeCategory,itemId);
    const del=document.createElement("button"); del.className="danger"; del.textContent="Obrisi svugdje"; del.onclick=()=>deleteItemEverywhere(itemId);
    adm.append(rename,placesBtn,up,down,rem,del);
    row.appendChild(adm);
  }
  return row;
}

function renderOrder(){
  const wrap=document.getElementById("orderView"); wrap.innerHTML="";
  const {urgent,need}=getProblems();

  const clearBox=document.createElement("div");
  clearBox.className="problem-card";
  clearBox.innerHTML=`<div class="problem-title">📦 Narudzba</div><div class="meta">Ovim gumbom vracas sve artikle iz narudzbe na IMA i brises biljeske.</div>`;
  const clearBtn=document.createElement("button"); clearBtn.className="danger"; clearBtn.textContent="✅ OBRISI CIJELU NARUDZBU"; clearBtn.onclick=clearOrder;
  clearBox.appendChild(document.createElement("br")); clearBox.appendChild(clearBtn); wrap.appendChild(clearBox);

  function card(title,arr){
    const c=document.createElement("div"); c.className="problem-card";
    const t=document.createElement("div"); t.className="problem-title"; t.textContent=`${title} (${arr.length})`; c.appendChild(t);
    if(!arr.length){ const empty=document.createElement("div"); empty.className="meta"; empty.textContent="Nema artikala."; c.appendChild(empty); }
    arr.forEach(x=>{
      const line=document.createElement("div"); line.className="problem-line";
      line.innerHTML=`<div><b>${x.itemName}</b><div class="meta">${x.categories} • ${x.changedBy||""} ${formatShort(x.changedAt)}</div>${x.note?`<div class="note">📝 ${x.note}</div>`:""}</div>`;
      const btn=document.createElement("button"); btn.className="green"; btn.textContent="IMA"; btn.onclick=()=>{if(confirm(`Vratiti "${x.itemName}" na IMA?`)) setItemState("order",x.itemId,"ok")};
      line.appendChild(btn); c.appendChild(line);
    });
    return c;
  }
  wrap.appendChild(card("🔴 HITNO",urgent));
  wrap.appendChild(card("🟡 TREBA",need));
}
function clearOrder(){
  const {urgent,need}=getProblems();
  const all=[...urgent,...need];
  if(!all.length){alert("Narudzba je vec prazna.");return;}
  if(!confirm(`Obrisati cijelu narudzbu?\n\nVratit ce se na IMA: ${all.length} artikala.`)) return;

  all.forEach(x=>{
    const oldStatus=state[x.itemId]?.status||"ok";
    const oldNote=state[x.itemId]?.note||"";
    state[x.itemId]={status:"ok",note:"",changedBy:currentUser,changedAt:Date.now()};
    pushHistory({time:Date.now(),user:currentUser,categoryId:"order",itemId:x.itemId,itemName:x.itemName,oldStatus,newStatus:"ok",oldNote,note:""});
  });
  set(stateRef,state);
  renderAll();
}
function renderHistory(){
  const wrap=document.getElementById("history"); wrap.innerHTML="";
  if(!isAdmin()){ wrap.innerHTML=`<div class="meta">Povijest je dostupna samo Teu i Anamariji.</div>`; return; }
  if(!history.length){ wrap.innerHTML=`<div class="meta">Jos nema povijesti.</div>`; return; }
  history.slice(0,200).forEach(h=>{
    const line=document.createElement("div"); line.className="history-line";
    const time=new Date(h.time).toLocaleString("hr-HR");
    const noteText=h.note?` • Biljeska: ${h.note}`:"";
    line.textContent=`${time} — ${h.user} — ${getCategoryName(h.categoryId)} — ${h.itemName}: ${stateLabel(h.oldStatus)} → ${stateLabel(h.newStatus)}${noteText}`;
    wrap.appendChild(line);
  });
}

// ADMIN FUNKCIJE
function renameItem(itemId){
  const oldName=getItemName(itemId);
  const name=prompt("Novi naziv artikla:",oldName);
  if(!name || name.trim()===oldName) return;
  items[itemId].name=name.trim();
  set(itemsRef,items);
}
function manageItemCategories(itemId){
  const selected = categories.filter(c=>(c.items||[]).includes(itemId)).map(c=>c.id);
  const chosen = chooseCategoriesForItem(itemId, selected);
  if(!chosen) return;
  categories.forEach(cat=>{
    cat.items=(cat.items||[]).filter(id=>id!==itemId);
    if(chosen.includes(cat.id)) cat.items.push(itemId);
  });
  set(categoriesRef,categories);
}
function removeFromCategory(catId,itemId){
  const cat=categories.find(c=>c.id===catId);
  if(!cat) return;
  if(!confirm(`Maknuti "${getItemName(itemId)}" iz "${cat.name}"?`)) return;
  cat.items=(cat.items||[]).filter(id=>id!==itemId);
  set(categoriesRef,categories);
}
function deleteItemEverywhere(itemId){
  if(!confirm(`Potpuno obrisati artikl "${getItemName(itemId)}" iz svih skladista?`)) return;
  delete items[itemId];
  delete state[itemId];
  categories.forEach(cat=>{cat.items=(cat.items||[]).filter(id=>id!==itemId)});
  set(itemsRef,items);
  set(categoriesRef,categories);
  set(stateRef,state);
}
function moveItemInCategory(catId,itemId,dir){
  const cat=categories.find(c=>c.id===catId);
  if(!cat) return;
  const idx=(cat.items||[]).indexOf(itemId);
  if(idx<0) return;
  const ni=idx+dir;
  if(ni<0 || ni>=cat.items.length) return;
  const tmp=cat.items[idx]; cat.items[idx]=cat.items[ni]; cat.items[ni]=tmp;
  set(categoriesRef,categories);
}
function addCategory(){
  const name=prompt("Naziv novog skladista:");
  if(!name) return;
  const idBase=slugify(name);
  let id=idBase; let n=2;
  while(categories.some(c=>c.id===id)){id=idBase+"_"+n;n++}
  categories.push({id,name,items:[]});
  activeCategory=id;
  set(categoriesRef,categories);
}
function renameCategory(catId){
  const cat=categories.find(c=>c.id===catId);
  if(!cat) return;
  const name=prompt("Novi naziv skladista:",cat.name);
  if(!name || name.trim()===cat.name) return;
  cat.name=name.trim();
  set(categoriesRef,categories);
}
function deleteCategory(catId){
  const cat=categories.find(c=>c.id===catId);
  if(!cat) return;
  if(!confirm(`Obrisati skladiste "${cat.name}"?\n\nArtikli se ne brisu, samo se uklanja ovo skladiste.`)) return;
  categories=categories.filter(c=>c.id!==catId);
  if(activeCategory===catId) activeCategory=categories[0]?.id || "";
  set(categoriesRef,categories);
}
function moveCategory(catId,dir){
  const idx=categories.findIndex(c=>c.id===catId);
  if(idx<0)return;
  const ni=idx+dir;
  if(ni<0 || ni>=categories.length)return;
  const tmp=categories[idx]; categories[idx]=categories[ni]; categories[ni]=tmp;
  set(categoriesRef,categories);
}

function renderAll(){
  renderTopbar();
  renderTabs();
  if(currentView==="items")renderItems();
  if(currentView==="order")renderOrder();
  if(currentView==="history")renderHistory();
}

// FIREBASE LISTENERS
onValue(oldCategoriesRef, snapshot=>{oldCategoriesData=snapshot.val(); oldCategoriesLoaded=true; migrateIfNeeded();});
onValue(oldStateRef, snapshot=>{oldStateData=snapshot.val(); oldStateLoaded=true; migrateIfNeeded();});
onValue(itemsRef, snapshot=>{v3ItemsData=snapshot.val(); v3ItemsLoaded=true; items=v3ItemsData||items; migrateIfNeeded(); renderAll();});
onValue(categoriesRef, snapshot=>{
  v3CategoriesData=snapshot.val();
  v3CategoriesLoaded=true;
  migrateIfNeeded();
  renderAll();
});
onValue(stateRef, snapshot=>{state=snapshot.val()||{}; renderAll();});
onValue(historyRef, snapshot=>{
  const data=snapshot.val()||{};
  history=Object.values(data).sort((a,b)=>(b.time||0)-(a.time||0)).slice(0,500);
  renderAll();
});


// CISTI RUCNI IMPORT IZ V2 - V3.8 FIX
window.importV2Manual = async function importV2Manual(){
  try{
    const oldCatsRaw = oldCategoriesData || [];
    const oldCats = Array.isArray(oldCatsRaw) ? oldCatsRaw : Object.values(oldCatsRaw || {});
    const oldState = oldStateData || {};

    if(!oldCats.length){
      alert("Ne vidim v2 kategorije. Pricekaj par sekundi ili refreshaj stranicu pa probaj opet.");
      return;
    }

    const newItems = {};
    const newCategories = [];
    const newState = {};
    const nameToId = {};

    oldCats.forEach(cat=>{
      if(!cat) return;

      const catId = cat.id || slugify(cat.name || ("skladiste_" + Date.now()));
      const catName = cat.name || catId;
      const rawItems = Array.isArray(cat.items) ? cat.items : Object.values(cat.items || {});
      const itemIds = [];

      rawItems.forEach(raw=>{
        const name = String(raw || "").trim();
        if(!name) return;

        const nameKey = name.toLowerCase();
        let itemId = nameToId[nameKey];

        if(!itemId){
          itemId = slugify(name);
          let base = itemId;
          let n = 2;
          while(newItems[itemId]){
            itemId = base + "_" + n;
            n++;
          }
          nameToId[nameKey] = itemId;
          newItems[itemId] = {id:itemId, name:name, createdAt:Date.now()};
        }

        if(!itemIds.includes(itemId)) itemIds.push(itemId);

        if(!newState[itemId]){
          newState[itemId] = {status:"ok", note:"", changedBy:"", changedAt:0};
        }

        const oldKey = catId + "__" + name;
        const old = oldState[oldKey] || {};

        if(old.status === "urgent" || (old.status === "need" && newState[itemId].status !== "urgent")){
          newState[itemId] = {
            status: old.status || "ok",
            note: old.note || "",
            changedBy: old.changedBy || "",
            changedAt: old.changedAt || 0
          };
        }
      });

      // BITNO: dodaj skladiste i kad ima 0 artikala, ali items uvijek mora postojati
      newCategories.push({id:catId, name:catName, items:itemIds});
    });

    const countItems = Object.keys(newItems).length;
    const countCats = newCategories.length;

    if(!countItems || !countCats){
      alert("Import nije dobar. Skladista: " + countCats + ", artikala: " + countItems);
      return;
    }

    const ok = confirm(
      "Uvesti v2 u v3?\\n\\n" +
      "Ovo ce napraviti potpuno novi cisti nabava_v3.\\n" +
      "Stara nabava baza ostaje netaknuta.\\n\\n" +
      "Skladista: " + countCats + "\\n" +
      "Artikala: " + countItems
    );
    if(!ok) return;

    importInProgress = true;

    // Lokalno prvo postavi tocno stanje
    items = newItems;
    categories = newCategories;
    state = newState;
    activeCategory = categories[0]?.id || "";

    // SPREMI KATEGORIJE PRVE, da listener ne pregazi categories na []
    await set(categoriesRef, newCategories);
    await set(itemsRef, newItems);
    await set(stateRef, newState);
    await set(metaRef, {version:"v3.8-manual-import-fixed", importedFromV2At:Date.now()});

    importInProgress = false;

    alert("Gotovo. Uvezeno skladista: " + newCategories.length + ", artikala: " + Object.keys(newItems).length);
    renderAll();
  }catch(err){
    importInProgress = false;
    console.error("V3.8 IMPORT ERROR", err);
    alert("Import je puknuo: " + err.message);
  }
};

window.renderAll=renderAll;
renderUsers(); if(currentUser)showApp();
